<!doctype html>
<meta charset="utf-8">
<title>Trending Sources Dashboard</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
<style>
  :root { --font: system-ui, -apple-system, Segoe UI, Roboto, Arial; }
  body { font-family: var(--font); margin: 24px; }
  header { display:flex; gap:12px; align-items: center; flex-wrap: wrap; }
  input, select, button { font: 14px var(--font); padding: 8px 10px; border-radius: 10px; border:1px solid #ddd; }
  .grid { display:grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-top: 18px; }
  .panel { border:1px solid #eee; border-radius: 14px; padding: 16px; box-shadow: 0 1px 6px rgba(0,0,0,0.05); }
  .panel h2 { font-size: 18px; margin: 0 0 10px; }
  ol { margin:0; padding-left: 22px; }
  li { margin: 8px 0; line-height: 1.35; }
  a { text-decoration: none; }
  a:hover { text-decoration: underline; }
  .muted { color:#666; font-size: 12px; }
  .meta { display:flex; gap:8px; align-items:center; margin-top: 6px; }
  @media (max-width: 1100px) { .grid { grid-template-columns: 1fr; } }
</style>
<header>
  <strong>Trending Sources Dashboard</strong>
  <span class="muted">Load the latest combined file generated by the scraper.</span>
  <input id="search" placeholder="Search headline...">
  <select id="sort">
    <option value="rankAsc">Sort by rank (asc)</option>
    <option value="rankDesc">Sort by rank (desc)</option>
    <option value="alpha">Sort by headline (A→Z)</option>
  </select>
  <button id="reload">Reload</button>
</header>
<div class="grid" id="grid"></div>
<script>
const CSV_PATH = "./trending_sources.csv";
const state = { raw: [], filterText: "", sortMode: "rankAsc" };

function normalizeRows(rows) {
  return rows.map(d => ({
    source: d.source || "",
    rank: +d.rank || 9999,
    headline: d.headline || "",
    link: d.link || "",
    collected_at_iso: d.collected_at_iso || ""
  }));
}

function applyFilters(rows) {
  let r = rows.slice();
  if (state.filterText) {
    const q = state.filterText.toLowerCase();
    r = r.filter(d => d.headline.toLowerCase().includes(q));
  }
  switch (state.sortMode) {
    case "rankAsc":  r.sort((a, b) => a.rank - b.rank); break;
    case "rankDesc": r.sort((a, b) => b.rank - a.rank); break;
    case "alpha":    r.sort((a, b) => d3.ascending(a.headline, b.headline)); break;
  }
  return r;
}

function panelId(source) {
  return source.toLowerCase().replace(/[^a-z0-9]+/g, "-");
}

function ensurePanels() {
  const sources = Array.from(new Set(state.raw.map(d => d.source)));
  const grid = d3.select("#grid");
  grid.html("");
  sources.forEach(source => {
    const id = panelId(source);
    grid.append("div")
      .attr("class", "panel")
      .html(`<h2>${source}</h2><div class="meta" id="${id}Meta"></div><ol id="${id}List"></ol>`);
  });
}

function render() {
  const sources = Array.from(new Set(state.raw.map(d => d.source)));
  sources.forEach(source => {
    const id = panelId(source);
    const rows = applyFilters(state.raw.filter(d => d.source === source));
    const list = d3.select(`#${id}List`).selectAll("li").data(rows, d => d.link);
    list.join(
      enter => {
        const li = enter.append("li");
        li.append("a")
          .attr("href", d => d.link)
          .attr("target", "_blank")
          .attr("rel", "noopener")
          .text(d => `#${d.rank} ${d.headline}`);
        return li;
      },
      update => update.select("a").text(d => `#${d.rank} ${d.headline}`),
      exit => exit.remove()
    );
    d3.select(`#${id}Meta`).text(rows.length ? `Items: ${rows.length} · Collected: ${rows[0].collected_at_iso}` : "No data");
  });
}

async function loadData() {
  const rows = await d3.csv(CSV_PATH);
  state.raw = normalizeRows(rows);
  ensurePanels();
  render();
}

d3.select("#search").on("input", ev => {
  state.filterText = ev.target.value || "";
  render();
});
d3.select("#sort").on("change", ev => {
  state.sortMode = ev.target.value;
  render();
});
d3.select("#reload").on("click", () => loadData());

loadData();
</script>
