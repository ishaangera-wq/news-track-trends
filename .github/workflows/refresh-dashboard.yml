name: Refresh Trending Dashboard

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */2 * * *"

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install chromium

      - name: Generate dashboard
        run: |
          python scrape_trending_sources.py \
            --site all \
            --headless \
            --out_csv docs/trending_sources.csv \
            --out_json docs/trending_sources.json \
            --out_html docs/index.html

      - name: Commit updated artifacts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/trending_sources.csv docs/trending_sources.json docs/index.html
          git diff --cached --quiet || git commit -m "Refresh trending dashboard data"
          git push
